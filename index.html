<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Breeze — High-Performance HTTP Framework for Go</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F8FAFC;
  --bg2:#FFFFFF;
  --card:#FFFFFF;
  --border:#E2E8F0;
  --cyan:#0066CC;
  --cyan-dim:#0055AA;
  --white:#0F172A;
  --dim:#475569;
  --dim2:#94A3B8;
  --green:#16A34A;
  --yellow:#CA8A04;
  --red:#DC2626;
  --purple:#7C3AED;
  --font-mono:'JetBrains Mono',monospace;
  --font-body:'Inter',sans-serif;
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--white);
  font-family:var(--font-body);font-size:16px;line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:2rem;
}

.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:4rem 2rem}
.page-inner{text-align:center;display:flex;flex-direction:column;align-items:center;gap:2rem;max-width:720px;width:100%}
.page-inner img{max-width:100%;height:auto;border-radius:8px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.06)}

.page-actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.btn-primary{
  font-family:var(--font-mono);font-weight:600;font-size:.85rem;
  padding:.75rem 1.8rem;border-radius:4px;
  background:var(--cyan);color:#000;text-decoration:none;letter-spacing:.04em;
  transition:all .2s;border:none;cursor:pointer;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,102,204,.25)}
.btn-ghost{
  font-family:var(--font-mono);font-weight:500;font-size:.85rem;
  padding:.75rem 1.8rem;border-radius:4px;
  border:1px solid var(--border);color:var(--dim);text-decoration:none;letter-spacing:.04em;
  transition:all .2s;background:transparent;cursor:pointer;
}
.btn-ghost:hover{color:var(--cyan);border-color:var(--cyan)}
.hero-sub{font-size:1.05rem;color:var(--dim);line-height:1.7;max-width:560px}

</style>
</head>
<body>
<div class="page">
  <div class="page-inner">
    <h1>Breeze &amp; BreezeORM</h1>
    <p class="hero-sub">A high-performance HTTP framework for Go — and its paired ORM. Simple, fast, and flexible.</p>
    <img src="https://pkg.go.dev/static/images/badge-go.svg" alt="Breeze placeholder image"/>
    <div class="page-actions">
      <a class="btn-primary" href="https://github.com/ormgo/breezeorm" target="_blank" rel="noopener noreferrer">View on GitHub</a>
      <a class="btn-ghost" href="/docs" target="_self">Documentation</a>
    </div>
  </div>
</div>
</body>
</html>
