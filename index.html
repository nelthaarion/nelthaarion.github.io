<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Breeze — High-Performance HTTP Framework for Go</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080B10;
  --bg2:#0D1117;
  --card:#111827;
  --border:#1E2D40;
  --cyan:#00E5FF;
  --cyan-dim:#007A8A;
  --white:#E8EDF2;
  --dim:#8899AA;
  --dim2:#4A5568;
  --green:#39FF14;
  --yellow:#FFD600;
  --red:#FF4455;
  --purple:#BD93F9;
  --font-mono:'JetBrains Mono',monospace;
  --font-body:'Inter',sans-serif;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:var(--font-body);font-size:16px;line-height:1.6;overflow-x:hidden}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:60px;
  background:rgba(8,11,16,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;color:var(--cyan);letter-spacing:-.02em;text-decoration:none}
.nav-logo span{color:var(--white);opacity:.5}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:var(--dim);text-decoration:none;font-size:.85rem;font-family:var(--font-mono);letter-spacing:.04em;transition:color .2s}
.nav-links a:hover{color:var(--cyan)}
.nav-cta{
  font-family:var(--font-mono);font-size:.8rem;font-weight:600;
  padding:.45rem 1.1rem;border-radius:4px;
  background:var(--cyan);color:#000;text-decoration:none;letter-spacing:.04em;
  transition:opacity .2s;
}
.nav-cta:hover{opacity:.85}

/* ── SECTIONS ── */
section{padding:6rem 0}
.container{max-width:1100px;margin:0 auto;padding:0 2rem}
.section-label{
  font-family:var(--font-mono);font-size:.72rem;letter-spacing:.18em;
  color:var(--cyan);text-transform:uppercase;margin-bottom:1rem;display:block;
}

/* ── HERO ── */
#hero{
  min-height:100vh;display:flex;align-items:center;padding-top:60px;
  background:radial-gradient(ellipse 60% 50% at 70% 50%, rgba(0,229,255,.05) 0%, transparent 70%);
  position:relative;overflow:hidden;
}
#hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% 120%, rgba(0,229,255,.04) 0%, transparent 60%);
  pointer-events:none;
}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.hero-eyebrow{
  font-family:var(--font-mono);font-size:.75rem;letter-spacing:.2em;
  color:var(--cyan);text-transform:uppercase;margin-bottom:1.5rem;
  display:flex;align-items:center;gap:.6rem;
}
.hero-eyebrow::before{content:'';display:block;width:24px;height:1px;background:var(--cyan)}
h1{
  font-family:var(--font-mono);font-size:3.8rem;font-weight:700;
  line-height:1.05;letter-spacing:-.04em;
  color:var(--white);margin-bottom:1.5rem;
}
h1 em{color:var(--cyan);font-style:normal}
.hero-sub{
  font-size:1.05rem;color:var(--dim);line-height:1.7;
  max-width:460px;margin-bottom:2.5rem;
}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap}
.btn-primary{
  font-family:var(--font-mono);font-weight:600;font-size:.85rem;
  padding:.75rem 1.8rem;border-radius:4px;
  background:var(--cyan);color:#000;text-decoration:none;letter-spacing:.04em;
  transition:all .2s;border:none;cursor:pointer;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 0 20px rgba(0,229,255,.3)}
.btn-ghost{
  font-family:var(--font-mono);font-weight:500;font-size:.85rem;
  padding:.75rem 1.8rem;border-radius:4px;
  border:1px solid var(--border);color:var(--dim);text-decoration:none;letter-spacing:.04em;
  transition:all .2s;background:transparent;cursor:pointer;
}
 
/* ── ANIMATIONS ── */
.fade-up{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.fade-up.visible{opacity:1;transform:none}
 
</style>
</head>
<body>
<script>
    window.location.replace("/breeze")
</script>
</body>
</html>
